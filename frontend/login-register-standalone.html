<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StoryForge 灵境档案 - 登录注册</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      color-scheme: dark;
      --panel: rgba(4, 6, 12, 0.88);
      --panel-strong: rgba(4, 6, 12, 0.96);
      --line: rgba(255, 255, 255, 0.09);
      --line-hot: rgba(244, 184, 92, 0.52);
      --gold: #f3b45c;
      --gold-soft: #f8d592;
      --cyan: #68ddff;
      --text: #f5efe2;
      --muted: rgba(237, 228, 211, 0.66);
      --danger: #ff9c9c;
      --success: #86e0b5;
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      background: #05070d;
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .login-stage {
      position: relative;
      min-height: 100vh;
      isolation: isolate;
      background:
        linear-gradient(90deg, rgba(2, 5, 12, 0.98) 0%, rgba(2, 5, 12, 0.87) 34%, rgba(2, 5, 12, 0.3) 78%),
        radial-gradient(circle at 72% 26%, rgba(74, 178, 225, 0.16), transparent 32%),
        #05070d;
    }

    .backdrop-image {
      position: fixed;
      inset: 0;
      z-index: -3;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      filter: brightness(0.82) saturate(0.96);
    }

    .backdrop-shade {
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.22), transparent 24%, rgba(0, 0, 0, 0.4)),
        linear-gradient(90deg, rgba(3, 5, 10, 0.95), rgba(3, 5, 10, 0.78) 36%, rgba(3, 5, 10, 0.24));
    }

    .login-panel {
      width: min(410px, 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 32px 28px 26px;
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-strong), var(--panel));
      backdrop-filter: blur(14px);
      box-shadow: 24px 0 70px rgba(0, 0, 0, 0.32);
    }

    .brand-section {
      flex: 0 0 auto;
    }

    .brand-icon {
      width: 56px;
      height: 56px;
      object-fit: contain;
      filter: drop-shadow(0 0 14px rgba(243, 180, 92, 0.24));
    }

    .brand-kicker {
      margin: 10px 0 0;
      color: var(--cyan);
      font-size: 11px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
    }

    .brand-title {
      margin: 4px 0 0;
      color: #f3f0e8;
      font-size: 38px;
      line-height: 1.05;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .brand-copy {
      max-width: 23ch;
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.72;
    }

    .menu-section {
      width: min(100%, 304px);
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: auto auto 26px;
    }

    .menu-item {
      width: 100%;
      min-height: 50px;
      display: grid;
      grid-template-columns: 24px 1fr auto;
      align-items: center;
      gap: 11px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.025);
      color: #d7d0c1;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    .menu-item:hover {
      border-color: rgba(243, 180, 92, 0.32);
      background: rgba(243, 180, 92, 0.055);
    }

    .menu-item.active {
      border-color: var(--line-hot);
      background: linear-gradient(90deg, rgba(243, 180, 92, 0.14), rgba(255, 255, 255, 0.025));
    }

    .menu-item-icon {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      color: rgba(243, 180, 92, 0.62);
    }

    .menu-item-icon svg,
    .footer-btn svg,
    .field-icon svg {
      width: 18px;
      height: 18px;
    }

    .menu-item.active .menu-item-icon {
      color: var(--gold);
    }

    .menu-item-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 15px;
      letter-spacing: 0.05em;
      text-align: left;
    }

    .menu-item-desc {
      color: rgba(215, 208, 193, 0.52);
      font-size: 10px;
      white-space: nowrap;
    }

    .form-section {
      flex: 0 0 auto;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .auth-form[hidden] {
      display: none;
    }

    .field {
      min-height: 48px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.035);
    }

    .field:focus-within {
      border-color: rgba(104, 221, 255, 0.46);
      box-shadow: 0 0 0 3px rgba(104, 221, 255, 0.08);
    }

    .field-icon {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: rgba(243, 180, 92, 0.58);
    }

    .field input {
      width: 100%;
      min-width: 0;
      padding: 13px 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 14px;
    }

    .field input::placeholder {
      color: rgba(215, 208, 193, 0.38);
    }

    .password-row {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .eye-btn {
      flex: 0 0 auto;
      min-width: 46px;
      padding: 7px 9px;
      border: 0;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.055);
      color: var(--cyan);
      font-size: 12px;
      cursor: pointer;
    }

    .form-row {
      min-height: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 4px;
    }

    .remember-box {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
    }

    .remember-box input {
      width: 14px;
      height: 14px;
      accent-color: var(--gold);
    }

    .ghost-link {
      border: 0;
      background: transparent;
      color: var(--cyan);
      font-size: 12px;
      cursor: pointer;
    }

    .primary-action {
      min-height: 48px;
      margin-top: 12px;
      padding: 13px 18px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--gold), var(--gold-soft) 52%, #ef9b37);
      color: #1c140d;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(239, 155, 55, 0.24);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .primary-action:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(239, 155, 55, 0.31);
    }

    .primary-action:disabled {
      cursor: wait;
      opacity: 0.68;
      transform: none;
    }

    .auth-status {
      min-height: 18px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
    }

    .auth-status.error {
      color: var(--danger);
    }

    .auth-status.success {
      color: var(--success);
    }

    .footer-section {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.055);
    }

    .footer-btn {
      min-height: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 8px 6px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: rgba(215, 208, 193, 0.52);
      cursor: pointer;
      transition: color 0.2s ease, background 0.2s ease;
    }

    .footer-btn:hover {
      background: rgba(255, 255, 255, 0.03);
      color: var(--gold);
    }

    .footer-btn span {
      font-size: 11px;
    }

    .api-note {
      margin: 12px 0 0;
      color: rgba(237, 228, 211, 0.42);
      font-size: 11px;
      line-height: 1.5;
      text-align: center;
    }

    @media (max-width: 760px) {
      .login-stage {
        background:
          linear-gradient(180deg, rgba(2, 5, 12, 0.96), rgba(2, 5, 12, 0.76)),
          #05070d;
      }

      .login-panel {
        width: 100%;
        padding: 24px 20px 22px;
        border-right: 0;
      }

      .brand-title {
        font-size: 32px;
      }

      .menu-section {
        width: 100%;
        margin-top: 34px;
      }

      .menu-item {
        grid-template-columns: 24px 1fr;
      }

      .menu-item-desc {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="login-stage">
    <img
      class="backdrop-image"
      src="file:///C:/Users/21539/Desktop/StoryForge/frontend/背景/login界面.png"
      alt="登录背景"
    />
    <div class="backdrop-shade" aria-hidden="true"></div>

    <section class="login-panel" aria-label="登录注册">
      <header class="brand-section">
        <img
          class="brand-icon"
          src="file:///C:/Users/21539/Desktop/StoryForge/frontend/图标/产品图标.png"
          alt="StoryForge 产品图标"
        />
        <p class="brand-kicker">StoryForge Archives</p>
        <h1 class="brand-title">灵境档案</h1>
        <p class="brand-copy">AI 掌卷人已启封灵境卷宗，与你共赴下一场冒险。</p>
      </header>

      <nav class="menu-section" aria-label="登录注册选项">
        <button type="button" class="menu-item active" data-mode="login" aria-pressed="true">
          <span class="menu-item-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 12a9 9 0 0 1-9 9m9-9a9 9 0 0 0-9-9m9 9H3m9 9a9 9 0 0 1-9-9m9 9c1.7 0 3-4 3-9s-1.3-9-3-9m0 18c-1.7 0-3-4-3-9s1.3-9 3-9m-9 9a9 9 0 0 1 9-9"/>
            </svg>
          </span>
          <span class="menu-item-label">登录</span>
          <span class="menu-item-desc">进入灵境档案</span>
        </button>

        <button type="button" class="menu-item" data-mode="register" aria-pressed="false">
          <span class="menu-item-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M19 8v6M22 11h-6"/>
            </svg>
          </span>
          <span class="menu-item-label">注册</span>
          <span class="menu-item-desc">创建新账号</span>
        </button>

        <button type="button" class="menu-item" data-mode="guest" aria-pressed="false">
          <span class="menu-item-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
              <path d="M2.5 12C3.7 7.9 7.5 5 12 5s8.3 2.9 9.5 7c-1.2 4.1-5 7-9.5 7s-8.3-2.9-9.5-7Z"/>
            </svg>
          </span>
          <span class="menu-item-label">游客进入</span>
          <span class="menu-item-desc">先体验大厅</span>
        </button>
      </nav>

      <section class="form-section">
        <form class="auth-form" id="loginForm" autocomplete="on">
          <label class="field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M16 7a4 4 0 1 1-8 0 4 4 0 0 1 8 0ZM12 14a7 7 0 0 0-7 7h14a7 7 0 0 0-7-7Z"/>
              </svg>
            </span>
            <input id="loginUsername" name="username" type="text" placeholder="用户名 / 邮箱" maxlength="50" required />
          </label>

          <label class="field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <span class="password-row">
              <input id="loginPassword" name="password" type="password" placeholder="密码" maxlength="128" required />
              <button type="button" class="eye-btn" data-toggle-password="loginPassword">显示</button>
            </span>
          </label>

          <div class="form-row">
            <label class="remember-box">
              <input id="rememberUser" type="checkbox" checked />
              <span>记住我</span>
            </label>
            <button type="button" class="ghost-link" data-shell="forgot">忘记密码?</button>
          </div>

          <button type="submit" class="primary-action" id="loginSubmit">进入灵境</button>
        </form>

        <form class="auth-form" id="registerForm" autocomplete="on" hidden>
          <label class="field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input id="registerNickname" name="nickname" type="text" placeholder="昵称" maxlength="50" required />
          </label>

          <label class="field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M16 7a4 4 0 1 1-8 0 4 4 0 0 1 8 0ZM12 14a7 7 0 0 0-7 7h14a7 7 0 0 0-7-7Z"/>
              </svg>
            </span>
            <input id="registerUsername" name="username" type="text" placeholder="用户名" minlength="3" maxlength="50" required />
          </label>

          <label class="field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <span class="password-row">
              <input id="registerPassword" name="password" type="password" placeholder="密码" minlength="6" maxlength="128" required />
              <button type="button" class="eye-btn" data-toggle-password="registerPassword">显示</button>
            </span>
          </label>

          <label class="field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input id="registerConfirmPassword" name="confirmPassword" type="password" placeholder="确认密码" minlength="6" maxlength="128" required />
          </label>

          <button type="submit" class="primary-action" id="registerSubmit">创建账号</button>
        </form>

        <p class="auth-status" id="authStatus" role="status" aria-live="polite"></p>
        <p class="api-note" id="apiNote"></p>
      </section>

      <footer class="footer-section" aria-label="辅助入口">
        <button class="footer-btn" type="button" data-shell="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5v.2a2 2 0 1 1-4 0v-.2a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.2a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3 1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.2a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8 1.7 1.7 0 0 0 1.5 1h.2a2 2 0 1 1 0 4h-.2a1.7 1.7 0 0 0-1.5 1Z"/>
          </svg>
          <span>设置</span>
        </button>
        <button class="footer-btn" type="button" data-shell="notice">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.7 21a2 2 0 0 1-3.4 0"/>
          </svg>
          <span>公告</span>
        </button>
        <button class="footer-btn" type="button" data-shell="support">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
            <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3ZM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3Z"/>
          </svg>
          <span>客服</span>
        </button>
      </footer>
    </section>
  </main>

  <script>
    const TOKEN_KEY = "storyforge_access_token";
    const USER_KEY = "storyforge_user";
    const SESSION_KEY = "storyforge_auth_session";
    const API_BASE_STORAGE_KEY = "storyforge_api_base";
    const params = new URLSearchParams(window.location.search);

    const menuItems = [...document.querySelectorAll(".menu-item")];
    const loginForm = document.querySelector("#loginForm");
    const registerForm = document.querySelector("#registerForm");
    const authStatus = document.querySelector("#authStatus");
    const apiNote = document.querySelector("#apiNote");
    const loginSubmit = document.querySelector("#loginSubmit");
    const registerSubmit = document.querySelector("#registerSubmit");
    const loginUsername = document.querySelector("#loginUsername");
    const rememberUser = document.querySelector("#rememberUser");

    function getApiBaseUrl() {
      const configured = params.get("api") || localStorage.getItem(API_BASE_STORAGE_KEY);
      if (configured) return configured.replace(/\/$/, "");
      if (window.location.protocol === "file:") return "http://127.0.0.1:8000/api/v1";
      return "/api/v1";
    }

    const API_BASE_URL = getApiBaseUrl();
    apiNote.textContent = `当前接口：${API_BASE_URL}`;

    function setStatus(message, type = "") {
      authStatus.className = type ? `auth-status ${type}` : "auth-status";
      authStatus.textContent = message;
    }

    function setSubmitting(formName, submitting) {
      const button = formName === "login" ? loginSubmit : registerSubmit;
      button.disabled = submitting;
      button.textContent = submitting ? "连接中..." : formName === "login" ? "进入灵境" : "创建账号";
    }

    function setMode(mode) {
      menuItems.forEach((item) => {
        const active = item.dataset.mode === mode;
        item.classList.toggle("active", active);
        item.setAttribute("aria-pressed", String(active));
      });

      loginForm.hidden = mode !== "login";
      registerForm.hidden = mode !== "register";
      if (mode === "guest") {
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem(USER_KEY);
        setStatus("已选择游客身份。公告和客服入口暂时仅作展示。", "success");
      } else {
        setStatus("");
      }
    }

    async function apiRequest(path, body) {
      let response;
      try {
        response = await fetch(`${API_BASE_URL}${path}`, {
          method: "POST",
          headers: {
            Accept: "application/json",
            "Content-Type": "application/json"
          },
          body: JSON.stringify(body)
        });
      } catch (error) {
        throw new Error(`无法连接后端：${API_BASE_URL}`);
      }

      const text = await response.text();
      let payload = null;
      if (text) {
        try {
          payload = JSON.parse(text);
        } catch {
          throw new Error("后端返回了无法解析的数据。");
        }
      }

      if (!response.ok || (payload && typeof payload.code === "number" && payload.code !== 0)) {
        throw new Error(readErrorMessage(payload) || `请求失败：${response.status}`);
      }

      return payload && Object.prototype.hasOwnProperty.call(payload, "data") ? payload.data : payload;
    }

    function readErrorMessage(payload) {
      const message = payload?.message || payload?.detail;
      if (!message) return "";
      if (typeof message === "string") {
        const dictionary = {
          "invalid username or password": "账号或密码不正确。",
          "username already exists": "该用户名已存在。",
          "email already exists": "该邮箱已存在。",
          "account is banned": "账号已被禁用。"
        };
        return dictionary[message] || message;
      }
      if (Array.isArray(message)) return message.map((item) => item.msg || String(item)).join("；");
      return String(message);
    }

    function storeAuth(payload) {
      if (payload?.access_token) localStorage.setItem(TOKEN_KEY, payload.access_token);
      if (payload?.user) localStorage.setItem(USER_KEY, JSON.stringify(payload.user));
    }

    function rememberLoginName(username) {
      if (rememberUser.checked) {
        localStorage.setItem(SESSION_KEY, username);
      } else {
        localStorage.removeItem(SESSION_KEY);
      }
    }

    function maybeEnterApp() {
      const redirect = params.get("redirect");
      if (!redirect) return;
      window.setTimeout(() => {
        window.location.href = redirect;
      }, 550);
    }

    menuItems.forEach((item) => {
      item.addEventListener("click", () => setMode(item.dataset.mode));
    });

    document.querySelectorAll("[data-toggle-password]").forEach((button) => {
      button.addEventListener("click", () => {
        const input = document.getElementById(button.dataset.togglePassword);
        const visible = input.type === "text";
        input.type = visible ? "password" : "text";
        button.textContent = visible ? "显示" : "隐藏";
      });
    });

    document.querySelectorAll("[data-shell]").forEach((button) => {
      button.addEventListener("click", () => {
        const shellName = {
          settings: "设置",
          notice: "公告",
          support: "客服",
          forgot: "忘记密码"
        }[button.dataset.shell] || "入口";
        setStatus(`${shellName}暂未接入，当前仅保留入口。`);
      });
    });

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const username = loginUsername.value.trim();
      const password = document.querySelector("#loginPassword").value;
      if (!username || !password) {
        setStatus("请填写用户名和密码。", "error");
        return;
      }

      setSubmitting("login", true);
      setStatus("正在连接灵境档案...");
      try {
        const result = await apiRequest("/auth/login", { username, password });
        storeAuth(result);
        rememberLoginName(username);
        const displayName = result?.user?.nickname || result?.user?.username || username;
        setStatus(`欢迎回来，${displayName}。`, "success");
        maybeEnterApp();
      } catch (error) {
        setStatus(error.message || "登录失败，请稍后再试。", "error");
      } finally {
        setSubmitting("login", false);
      }
    });

    registerForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const nickname = document.querySelector("#registerNickname").value.trim();
      const username = document.querySelector("#registerUsername").value.trim();
      const password = document.querySelector("#registerPassword").value;
      const confirmPassword = document.querySelector("#registerConfirmPassword").value;

      if (!nickname || !username || !password) {
        setStatus("请完整填写注册信息。", "error");
        return;
      }
      if (password !== confirmPassword) {
        setStatus("两次输入的密码不一致。", "error");
        return;
      }

      setSubmitting("register", true);
      setStatus("正在创建账号...");
      try {
        const result = await apiRequest("/auth/register", { nickname, username, password });
        storeAuth(result);
        localStorage.setItem(SESSION_KEY, username);
        setStatus("注册成功，账号已连接。", "success");
        maybeEnterApp();
      } catch (error) {
        setStatus(error.message || "注册失败，请稍后再试。", "error");
      } finally {
        setSubmitting("register", false);
      }
    });

    const remembered = localStorage.getItem(SESSION_KEY);
    if (remembered) loginUsername.value = remembered;
  </script>
</body>
</html>
